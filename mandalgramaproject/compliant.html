<!DOCTYPE html>
<html>
<head>
<title>Complaint Form</title>

<style>

/* FIX WIDTH ISSUE */
* {
  box-sizing: border-box;
}

/* Body */
body {
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(to right, #04AA6D, #2c3e50);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* Form Box */
form {
  background: white;
  width: 350px;
  border-radius: 10px;
  padding: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  animation: slideDown 0.6s ease;
}

/* Animation */
@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Title */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* Labels */
label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

/* Inputs */
input[type="text"],
textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 5px;
  transition: 0.3s;
}

/* Focus Effect */
input:focus, textarea:focus {
  border-color: #04AA6D;
  box-shadow: 0 0 5px #04AA6D;
  outline: none;
}

/* Textarea size */
textarea {
  resize: none;
  height: 100px;
}

/* Button */
input[type="submit"] {
  width: 100%;
  padding: 12px;
  background-color: #04AA6D;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

/* Hover */
input[type="submit"]:hover {
  background-color: #028a57;
  transform: scale(1.05);
}

</style>

</head>

<body>

<form action="complaint" method="post">

<h2>Register Complaint</h2>

<label>Name</label>
<input type="text" name="name" placeholder="Enter your name" required>

<label>Complaint</label>
<textarea name="complaint" placeholder="Enter your complaint" required></textarea>

<input type="submit" value="Submit">

</form>

</body>
</html>
